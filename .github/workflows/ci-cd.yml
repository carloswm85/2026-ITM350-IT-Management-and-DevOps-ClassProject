name: CI/CD Pipeline — Bulletin Board App

# 1. Trigger: push to main OR closed pull request into main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  IMAGE_NAME: bulletin-board-app
  # Subdirectory where the Vue app lives
  APP_DIR: bulletin-board-app

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest

    # Only run on push OR on a merged PR (not just any closed PR)
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── Node / npm setup ────────────────────────────────────────────────────
      # 2. Setup npm, ensuring Node version 20
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Point cache to the subdirectory's package-lock.json
          cache: "npm"
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      # ── Install dependencies ─────────────────────────────────────────────────
      # 3. Install dependencies — run inside the app subdirectory
      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm install

      # ── Tests ────────────────────────────────────────────────────────────────
      # 4. Run tests — --watchAll=false prevents Jest from hanging in CI
      - name: Run tests
        working-directory: ${{ env.APP_DIR }}
        run: npm run test -- --watchAll=false

      # 5. Run test coverage
      - name: Run test coverage
        working-directory: ${{ env.APP_DIR }}
        run: npm run test:coverage -- --watchAll=false

      # ── Docker: Login ────────────────────────────────────────────────────────
      # 6. Authenticate to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Docker: Metadata ─────────────────────────────────────────────────────
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}

      # ── Docker: Build & Push ─────────────────────────────────────────────────
      # Build context and Dockerfile both point into the subdirectory
      - name: Build and push Docker image
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: ./${{ env.APP_DIR }}
          file: ./${{ env.APP_DIR }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
